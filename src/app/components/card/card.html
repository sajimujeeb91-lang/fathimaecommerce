<div class="card" style="width: 18rem;">
  <img src={{productData.image}} class="card-img-top" alt="...">
  <div class="card-body">
    <h5 class="card-title">{{productData.title}}</h5>
    <p class="card-text">{{productData.description}}</p>
    <h5 class="text-success">{{productData.price}}</h5>
    <a [routerLink]="['/details',productData.id]"class
      = "btn btn-primary">view details
    </a>
  </div>
</div>
